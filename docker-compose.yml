services:
  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:-change-me-in-production}
    expose:
      - "8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
      - searxng_data:/var/cache/searxng
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/', timeout=5)\""
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend

  mcp:
    build:
      context: ./mcp_server
    restart: unless-stopped
    environment:
      MCP_PORT: ${MCP_PORT:-8789}
      MCP_BIND: ${MCP_BIND:-0.0.0.0}
      SEARXNG_BASE: ${SEARXNG_BASE:-http://searxng:8080}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
      BLOCK_PRIVATE_NET: ${BLOCK_PRIVATE_NET:-true}
      ALLOW_PRIVATE_NET: ${ALLOW_PRIVATE_NET:-false}
      MAX_HTML_BYTES: ${MAX_HTML_BYTES:-2000000}
    depends_on:
      searxng:
        condition: service_healthy
    ports:
      - "8789:8789"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8789/health',{headers:process.env.MCP_AUTH_TOKEN?{Authorization:'Bearer '+process.env.MCP_AUTH_TOKEN}:{}}).then(async r=>{const t=await r.text();process.exit(r.ok&&t==='ok'?0:1)}).catch(()=>process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s
    networks:
      - backend
      - frontend

networks:
  backend:
    internal: true
  frontend: {}

volumes:
  searxng_data: {}
